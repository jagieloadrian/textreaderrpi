ktor:
  application:
    modules:
      - com.anjo.ApplicationKt.module
  deployment:
    port: 8080

application:
  name: TextReaderRpi

display:
  gpioPins:
    spi_ce: 8
    spi_mosi: 10
    spi_miso: 9
    spi_sck: 11
  numDevices: 2
  brightness: true

hardware:
  spiTimeoutMs: 1000
  gpioTimeoutMs: 500

api:
  maxTextLength: 128
  queueSize: 10
  rateLimitPerMinute: 60

timing:
  scrollSpeed: 16
  refreshRate: 60

logging:
  level: INFO
  format: json

