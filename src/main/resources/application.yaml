ktor:
  application:
    modules:
      - com.anjo.ApplicationKt.module
  deployment:
    port: 8080

application:
  name: TextReaderRpi

display:
  type: "MAX7219"
  # Options: MAX7219, LCD, OLED
  
  max7219:
    numDevices: 2
    brightness: true
    gpioPins:
      spi_ce: 8
      spi_mosi: 10
      spi_miso: 9
      spi_sck: 11
  
  lcd:
    i2cAddress: 0x27
    busNumber: 1
    rows: 2
    columns: 16
  
  oled:
    i2cAddress: 0x3C
    busNumber: 1
    width: 128
    height: 64

hardware:
  spiTimeoutMs: 1000
  gpioTimeoutMs: 500

retry:
  maxAttempts: 5
  initialDelayMs: 1000
  maxDelayMs: 30000
  factor: 2.0

api:
  maxTextLength: 128
  queueSize: 10
  rateLimitPerMinute: 60
  metricsRateLimitPerMinute: 120

resources:
  screenDriverMaxSlots: 10

timing:
  scrollSpeed: 16
  refreshRate: 60

logging:
  level: INFO
  format: json

